<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payments Dashboard — Ingresar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #F2F3F4;
    color: #232942;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #C4C6CF;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,28,0.06);
  }
  .logo {
    width: 48px; height: 48px;
    background: #4CBF8C;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #232942;
    line-height: 24px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 13px;
    color: #4C516D;
    font-weight: 500;
    margin-bottom: 32px;
    line-height: 20px;
  }
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 12px 24px;
    background: #fff;
    border: 1.5px solid #C4C6CF;
    border-radius: 25px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #232942;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    text-decoration: none;
  }
  .btn-google:hover {
    border-color: #4CBF8C;
    box-shadow: 0 2px 8px rgba(76,191,140,0.15);
    background: #F9FFFC;
  }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
  .divider {
    border: none;
    border-top: 1px solid #EDEEF0;
    margin: 28px 0;
  }
  .footer-note {
    font-size: 11px;
    color: #A9ACB9;
    font-weight: 500;
    line-height: 16px;
  }
  .error-box {
    display: none;
    background: #FFE9EA;
    border: 1px solid #DC4B5C;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #DC4B5C;
    font-weight: 500;
    margin-bottom: 20px;
    text-align: left;
  }
  .no-config-box {
    display: none;
    background: #FFFAB9;
    border: 1px solid #FFC000;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #856800;
    font-weight: 500;
    margin-bottom: 20px;
    text-align: left;
    line-height: 18px;
  }
  .no-config-box code {
    background: #F2F3F4;
    border: 1px solid #C4C6CF;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">P</div>
  <h1>Payments Dashboard</h1>
  <p class="subtitle">Accede con tu cuenta de ComunidadFeliz<br>(@comunidadfeliz.cl)</p>

  <div id="error-box" class="error-box"></div>
  <div id="no-config-box" class="no-config-box"></div>

  <a href="/auth/google" class="btn-google" id="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Ingresar con Google
  </a>

  <hr class="divider">
  <p class="footer-note">Solo cuentas @comunidadfeliz.cl tienen acceso.<br>La sesión dura 8 horas.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');

  if (error === 'domain') {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = 'Tu cuenta no pertenece a @comunidadfeliz.cl. Solo el equipo de ComunidadFeliz puede acceder.';
  } else if (error === 'auth_failed') {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = 'Hubo un error al autenticar con Google. Intenta de nuevo.';
  } else if (error === 'cancelled') {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = 'Ingreso cancelado. Vuelve a intentarlo cuando quieras.';
  } else if (error === 'no_google_config') {
    const box = document.getElementById('no-config-box');
    box.style.display = 'block';
    box.innerHTML = `<strong>Google OAuth no configurado.</strong><br>Agrega al <code>.env</code>:<br><br>
      <code>GOOGLE_CLIENT_ID=...</code><br>
      <code>GOOGLE_CLIENT_SECRET=...</code><br><br>
      Obtén las credenciales en <strong>console.cloud.google.com</strong> → APIs & Services → Credentials.`;
    document.getElementById('google-btn').style.opacity = '0.5';
    document.getElementById('google-btn').style.pointerEvents = 'none';
  }
</script>
</body>
</html>
